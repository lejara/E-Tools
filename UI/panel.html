<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Elementor Tools</title>
    <style>
      body {
        font:
          12px/1.4 system-ui,
          sans-serif;
        margin: 0;
        padding: 12px;
        background: #1e1e1e;
        color: #eee;
      }
      h1 {
        font-size: 11px;
        margin: 0 0 8px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #999;
      }
      .title {
        font-size: 14px;
        font-weight: 600;
        word-break: break-word;
      }
      .empty {
        color: #888;
        font-style: italic;
      }
      .meta {
        margin-top: 4px;
        color: #999;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        word-break: break-all;
      }
      .actions {
        margin-top: 10px;
      }
      button.clear {
        background: #333;
        color: #eee;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 4px 10px;
        font: inherit;
        font-size: 11px;
        cursor: pointer;
      }
      button.clear:hover {
        background: #3a3a3a;
      }
      button.clear:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .options {
        margin-top: 14px;
      }
      .option {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
      }
      .option input[type="checkbox"] {
        accent-color: #7a9cff;
        cursor: pointer;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .field-label {
        font-size: 10px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .text-input {
        background: #151515;
        color: #eee;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 5px 7px;
        font: inherit;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        outline: none;
      }
      .text-input:focus {
        border-color: #4a4a4a;
      }
      .logs-header {
        margin-top: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logs {
        margin-top: 6px;
        max-height: 180px;
        overflow-y: auto;
        background: #151515;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 6px 8px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
      }
      .logs .empty {
        color: #555;
      }
      .log {
        display: flex;
        gap: 6px;
        padding: 2px 0;
        border-bottom: 1px solid #232323;
        word-break: break-word;
      }
      .log:last-child {
        border-bottom: 0;
      }
      .log .time {
        color: #666;
        flex: 0 0 auto;
      }
      .log .msg {
        flex: 1 1 auto;
      }
      .log.info .msg {
        color: #d0d0d0;
      }
      .log.warn .msg {
        color: #e0b060;
      }
      .log.error .msg {
        color: #e07070;
      }
      .hotkeys {
        margin-top: 6px;
        background: #151515;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 6px 8px;
      }
      .hotkey {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 0;
        border-bottom: 1px solid #232323;
      }
      .hotkey:last-child {
        border-bottom: 0;
      }
      .hotkey kbd,
      .hotkey-capture {
        flex: 0 0 auto;
        font-family: ui-monospace, monospace;
        font-size: 10px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 3px;
        padding: 1px 5px;
        color: #d0d0d0;
        white-space: nowrap;
      }
      .hotkey-capture {
        min-width: 92px;
        text-align: center;
        cursor: pointer;
        font-weight: inherit;
        padding: 2px 6px;
      }
      .hotkey-capture:hover {
        background: #333;
      }
      .hotkey-capture.recording {
        border-color: #7a9cff;
        color: #7a9cff;
      }
      .hotkey-reset {
        flex: 0 0 auto;
        margin-left: auto;
        background: transparent;
        border: 1px solid #333;
        border-radius: 3px;
        color: #888;
        padding: 1px 6px;
        font: inherit;
        font-size: 11px;
        cursor: pointer;
      }
      .hotkey-reset:hover {
        color: #d0d0d0;
        border-color: #4a4a4a;
      }
      .hotkey .desc {
        color: #d0d0d0;
      }
      .hotkey-footer {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 8px;
      }
      .hotkey-error {
        color: #e07070;
        font-size: 11px;
        flex: 1 1 auto;
      }
    </style>
  </head>
  <body>
    <h1>Root Layer</h1>
    <div id="title" class="title empty">No Root layer</div>
    <div id="meta" class="meta"></div>
    <div class="actions">
      <button id="clear" class="clear" type="button" disabled>Clear</button>
    </div>
    <h1 class="options">Options</h1>
    <label class="option" for="opt-replace-children">
      <input id="opt-replace-children" type="checkbox" />
      <span>Replace Children Styles</span>
    </label>
    <label class="option" for="opt-overlay" style="margin-top: 6px">
      <input id="opt-overlay" type="checkbox" />
      <span>Show UI Overlay</span>
    </label>
    <div class="field" style="margin-top: 10px">
      <label for="opt-working-domain" class="field-label">Working Domain</label>
      <input
        id="opt-working-domain"
        type="text"
        class="text-input"
        placeholder="https://google.com"
        spellcheck="false"
        autocomplete="off"
      />
    </div>
    <div class="logs-header">
      <h1>Logs</h1>
      <button id="clear-logs" class="clear" type="button" disabled>
        Clear
      </button>
    </div>
    <div id="logs" class="logs"><div class="empty">No activity yet</div></div>
    <h1 style="margin-top: 14px">Hotkeys</h1>
    <div class="hotkeys" id="hotkeys"></div>
    <div class="hotkey-footer">
      <button id="reset-all-hotkeys" class="clear" type="button">
        Reset all
      </button>
      <span id="hotkey-error" class="hotkey-error"></span>
    </div>
    <div class="hotkeys" style="margin-top: 6px">
      <div class="hotkey">
        <kbd>Shift+Click</kbd>
        <span class="desc">Multi-select layer in navigator</span>
      </div>
    </div>
    <script src="../hotkey-defaults.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
